name: ReportKitSimple
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.2"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.41.1
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.ai.ReportKitSimple
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: 17.2
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
    GENERATE_INFOPLIST_FILE: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
targets:
  ReportKitSimple:
    type: application
    platform: iOS
    deploymentTarget: "17.2"
    sources:
      - path: App/Sources
      - path: Shared
    resources:
      - path: App/Resources
    info:
      path: App/Resources/Info.plist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: ReportKitSimple
        INFOPLIST_FILE: App/Resources/Info.plist
        REPORTKIT_SUPABASE_ANON_KEY: "$(REPORTKIT_SUPABASE_ANON_KEY)"
        REPORTKIT_SUPABASE_URL: "$(REPORTKIT_SUPABASE_URL)"
    dependencies:
      - package: Supabase
      - target: ReportKitSimpleWidgetExtension
        embed: true
  ReportKitSimpleWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.2"
    sources:
      - path: Widget/Sources
      - path: Shared
    resources:
      - path: Widget/Resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: ReportKitSimpleWidgetExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.ai.ReportKitSimple.widget
        INFOPLIST_FILE: Widget/Resources/Info.plist
        SKIP_INSTALL: YES
  ReportKitSimpleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.2"
    sources:
      - path: ReportKitSimpleTests
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: ReportKitSimpleTests
        PRODUCT_BUNDLE_IDENTIFIER: com.ai.ReportKitSimpleTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ReportKitSimple
  ReportKitSimpleUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.2"
    sources:
      - path: ReportKitSimpleUITests
    settings:
      base:
        PRODUCT_NAME: ReportKitSimpleUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.ai.ReportKitSimpleUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ReportKitSimple
    dependencies:
      - target: ReportKitSimple
schemes:
  ReportKitSimple:
    build:
      targets:
        ReportKitSimple: all
        ReportKitSimpleWidgetExtension: all
        ReportKitSimpleTests: [test]
        ReportKitSimpleUITests: [test]
    test:
      targets:
        - ReportKitSimpleTests
        - ReportKitSimpleUITests
