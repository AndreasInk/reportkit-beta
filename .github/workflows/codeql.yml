name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "23 4 * * 3"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            os: ubuntu-latest
          - language: javascript-typescript
            os: ubuntu-latest
          - language: swift
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        if: ${{ matrix.language == 'javascript-typescript' }}
        uses: actions/setup-node@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cli/package-lock.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd677812177e0c29f9c970a6c58d8607ae1bfefd
        with:
          languages: ${{ matrix.language }}

      - name: Build CLI
        if: ${{ matrix.language == 'javascript-typescript' }}
        run: |
          npm --prefix cli ci
          npm --prefix cli run build

      - name: Autobuild Swift
        if: ${{ matrix.language == 'swift' }}
        uses: github/codeql-action/autobuild@dd677812177e0c29f9c970a6c58d8607ae1bfefd

      - name: Analyze
        uses: github/codeql-action/analyze@dd677812177e0c29f9c970a6c58d8607ae1bfefd
        with:
          category: "/language:${{ matrix.language }}"
